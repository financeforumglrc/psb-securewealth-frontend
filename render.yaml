# PSB SecureWealth — Render Blueprint
# This blueprint creates/updates two services:
#   1. psb-securewealth-backend  (Node + SQLite backend, also serves the built SPA)
#   2. psb-securewealth-frontend (static Vite SPA)
#
# To apply: Render Dashboard → Blueprints → New Blueprint Instance → select this repo.

services:
  - type: web
    name: psb-securewealth-backend
    runtime: docker
    repo: https://github.com/financeforumglrc/psb-securewealth-frontend.git
    plan: standard
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    healthCheckPath: /api/v1/health

  - type: static
    name: psb-securewealth-frontend
    runtime: static
    repo: https://github.com/financeforumglrc/psb-securewealth-frontend.git
    branch: main
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://psb-securewealth-backend.onrender.com/api/v1
      - key: VITE_API_BASE_URL
        value: https://psb-securewealth-backend.onrender.com/api/v1
