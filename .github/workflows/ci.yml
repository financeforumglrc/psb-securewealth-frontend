name: CI — Tests & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-do-not-use-in-production' }}
      ADMIN_ID: ${{ secrets.ADMIN_ID || 'ciadmin' }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'ci-admin-password' }}
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        # Run sequentially because the SQLite database file is shared across test files
        run: npx jest --runInBand --coverage

  client-tests:
    name: Client Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    env:
      VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL || 'http://localhost:5000/api/v1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Run client tests
        run: npm run test:run

      - name: Build client
        run: npm run build
