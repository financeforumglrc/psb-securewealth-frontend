name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: secrets.RENDER_API_KEY != '' && secrets.RENDER_BACKEND_SERVICE_ID != ''
    steps:
      - name: Trigger Render backend deploy
        run: |
          echo "Triggering Render deploy for service ${{ secrets.RENDER_BACKEND_SERVICE_ID }}"
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'

      - name: Wait for deploy to start
        run: sleep 10

      - name: Poll health endpoint (optional sanity check)
        run: |
          for i in {1..12}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://psb-securewealth-backend.onrender.com/api/v1/health || true)
            echo "Health check attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "Health endpoint did not return 200 within 3 minutes; deploy may still be in progress."
