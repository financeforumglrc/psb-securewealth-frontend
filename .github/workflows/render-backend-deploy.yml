name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render backend deploy
        run: |
          echo "Triggering Render backend deploy via deploy hook..."
          curl -s -X POST \
            "https://api.render.com/deploy/srv-d8p6ohernols73f7hkkg?key=PYPK_51t3-I" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}'

      - name: Wait for service to restart
        run: sleep 20
