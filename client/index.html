<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#1B5E20" />
    <meta name="background-color" content="#F5F7F4" />
    <meta name="description" content="Punjab & Sind Bank Internet Banking Portal - AI-powered digital wealth intelligence with built-in fraud protection. PSB Hackathon 2026." />
    <meta name="keywords" content="Punjab and Sind Bank, PSB, Internet Banking, Wealth Management, AI Banking, PSB Hackathon 2026" />
    <meta name="author" content="Punjab & Sind Bank" />
    <meta name="robots" content="index, follow" />
    
    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PSB Banking" />
    
    <!-- Android Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PSB Banking" />
    
    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#1B5E20" />
    <meta name="msapplication-config" content="none" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#1B5E20" />
    
    <title>Punjab & Sind Bank - Internet Banking Portal</title>
    
    <!-- Font Awesome async load -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" /></noscript>
    
    <!-- Leaflet for Fraud Heatmap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Mobile touch optimizations -->
    <style>
      html { -webkit-tap-highlight-color: transparent; }
      body { -webkit-touch-callout: none; }
      @supports (padding-top: env(safe-area-inset-top)) {
        .safe-area-top { padding-top: env(safe-area-inset-top); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .safe-area-left { padding-left: env(safe-area-inset-left); }
        .safe-area-right { padding-right: env(safe-area-inset-right); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
